name: Build & Release Executables

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: macos
            runner: macos-latest
            ext: ""
          - os: windows
            runner: windows-latest
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pyinstaller
        run: pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          cd editor/
          pyinstaller --onefile main.py --name editor-${{ matrix.os }}${{ matrix.ext }}

      - name: Rename binary
        run: |
          mv dist/editor-${{ matrix.os }}${{ matrix.ext }} editor-${{ matrix.os }}${{ matrix.ext }}
        shell: bash

      - name: Make binary executable (macOS)
        if: matrix.os == 'macos'
        run: chmod +x editor-${{ matrix.os }}

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: editor-${{ matrix.os }}${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}